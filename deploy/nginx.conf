# Flight Log Check Demo — nginx reverse proxy
# Mounted at /etc/nginx/conf.d/default.conf by docker-compose.

# HTTP -> app, plus ACME challenge passthrough for certbot.
server {
    listen 80 default_server;
    server_name _;

    # Allow big uploads (mobile photos can be 5-15 MB).
    client_max_body_size 20m;
    client_body_timeout 60s;

    # Lets certbot renew certs when it's run on the host.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://app:8003;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # OCR + VLM review can take 30-90s on the cold path.
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # Disable buffering so streamed responses show progress.
        proxy_buffering off;
    }
}

