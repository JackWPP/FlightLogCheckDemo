# Flight Log Check Demo — nginx reverse proxy
# Mounted at /etc/nginx/conf.d/default.conf by docker-compose.

# HTTP -> app, plus ACME challenge passthrough for certbot.
# Port 9080 is chosen as an uncommon default — see docker-compose.yml.
server {
    listen 9080 default_server;
    server_name _;

    # Allow generous uploads:
    #   - high-DPI phone photos can reach 10-20 MB
    #   - scanned PDFs/images can reach 30+ MB
    client_max_body_size 50m;
    # Time to receive the whole request body from the client.
    client_body_timeout 120s;

    # Lets certbot renew certs when it's run on the host.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://app:8003;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # PP-OCRv6 + DeepSeek cleaner + ROI-VLM review can take 30-90s
        # on the cold path. 5 minutes gives plenty of headroom.
        proxy_connect_timeout 15s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        # Disable buffering so streamed responses show progress.
        proxy_buffering off;
    }
}

