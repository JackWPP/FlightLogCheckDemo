<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ROI 标注器</title>
  <style>
    body { margin: 0; font: 14px system-ui, sans-serif; background: #f5f7f9; color: #1c2430; }
    header { display: flex; gap: 10px; align-items: center; padding: 10px; background: #fff; border-bottom: 1px solid #dce3ea; }
    input, button, textarea { font: inherit; }
    canvas { display: block; margin: 12px auto; background: #fff; border: 1px solid #dce3ea; max-width: calc(100vw - 24px); }
    aside { position: fixed; right: 12px; top: 64px; width: 360px; background: #fff; border: 1px solid #dce3ea; border-radius: 8px; padding: 10px; box-shadow: 0 8px 24px #0001; }
    textarea { width: 100%; height: 220px; }
  </style>
</head>
<body>
  <header>
    <strong>ROI 标注器</strong>
    <input id="imageFile" type="file" accept="image/*">
    <button id="exportBtn">导出 JSON</button>
    <span>拖拽框选，右侧编辑 id/label。</span>
  </header>
  <canvas id="canvas"></canvas>
  <aside>
    <label>当前框 JSON</label>
    <textarea id="editor"></textarea>
    <button id="saveBtn">保存当前框</button>
    <pre id="list"></pre>
  </aside>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const editor = document.getElementById('editor');
    const list = document.getElementById('list');
    let img = null, scale = 1, boxes = [], start = null, current = null;

    document.getElementById('imageFile').onchange = (e) => {
      const file = e.target.files[0];
      img = new Image();
      img.onload = () => {
        scale = Math.min(1, (window.innerWidth - 420) / img.width);
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        draw();
      };
      img.src = URL.createObjectURL(file);
    };
    canvas.onmousedown = (e) => { start = point(e); current = null; };
    canvas.onmousemove = (e) => {
      if (!start) return;
      const p = point(e);
      current = [Math.min(start.x, p.x), Math.min(start.y, p.y), Math.abs(p.x - start.x), Math.abs(p.y - start.y)];
      draw();
    };
    canvas.onmouseup = () => {
      if (current && current[2] > 5 && current[3] > 5) {
        const bbox = current.map(v => Math.round(v / scale));
        editor.value = JSON.stringify({ id: 'field_id', label: '字段', bbox }, null, 2);
      }
      start = null;
    };
    document.getElementById('saveBtn').onclick = () => {
      boxes.push(JSON.parse(editor.value));
      current = null;
      draw();
      list.textContent = JSON.stringify(boxes, null, 2);
    };
    document.getElementById('exportBtn').onclick = () => {
      const blob = new Blob([JSON.stringify(boxes, null, 2)], {type: 'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'rois.json';
      a.click();
    };
    function point(e) {
      const r = canvas.getBoundingClientRect();
      return { x: e.clientX - r.left, y: e.clientY - r.top };
    }
    function draw() {
      if (!img) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      ctx.lineWidth = 2;
      for (const box of boxes) drawBox(box.bbox, '#1c6fb8', box.id);
      if (current) drawBox(current.map(v => v / scale), '#cf3d35', 'new');
    }
    function drawBox(bbox, color, label) {
      const [x,y,w,h] = bbox.map(v => v * scale);
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.strokeRect(x, y, w, h);
      ctx.fillText(label, x + 3, y + 14);
    }
  </script>
</body>
</html>
