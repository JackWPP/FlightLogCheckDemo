<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>飞行记录单核查 Demo</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --ink: #17202a;
      --muted: #657282;
      --line: #d9e0e8;
      --panel: #ffffff;
      --bad: #cf3d35;
      --good: #16845f;
      --accent: #1c6fb8;
      --warn: #b7791f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font: 14px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 0 18px;
      background: #ffffff;
      border-bottom: 1px solid var(--line);
    }
    h1 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: 0; }
    main {
      display: grid;
      grid-template-columns: minmax(300px, 0.95fr) minmax(420px, 1.2fr) minmax(300px, 0.85fr);
      gap: 14px;
      padding: 14px;
      min-height: calc(100vh - 58px);
    }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      min-width: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .section-head {
      min-height: 46px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
    }
    .section-head h2 { margin: 0; font-size: 15px; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .tabs { display: flex; gap: 6px; align-items: center; }
    .tab.active { background: var(--ink); border-color: var(--ink); color: #fff; }
    .hidden { display: none !important; }
    button, select, input[type="text"] {
      height: 34px;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 6px;
      padding: 0 10px;
      color: var(--ink);
    }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    input[type="file"] { max-width: 210px; }
    .viewer {
      position: relative;
      flex: 1;
      min-height: 300px;
      background: #eef2f5;
      overflow: auto;
      padding: 12px;
    }
    .task-board {
      display: grid;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
      max-height: 240px;
      overflow: auto;
    }
    .task-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 6px 10px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      cursor: pointer;
    }
    .task-card.running { border-color: #f2d39b; background: #fffaf0; }
    .task-card.done { border-color: #b8e2d1; background: #f3fbf7; }
    .task-card.failed { border-color: #efc0ba; background: #fff4f2; }
    .task-card strong { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .task-card small { color: var(--muted); overflow-wrap: anywhere; }
    .viewer img { max-width: 100%; display: block; border: 1px solid var(--line); background: #fff; }
    .viewer img,
    .evidence img,
    .layout-stage {
      cursor: zoom-in;
    }
    .evidence-board {
      display: grid;
      gap: 12px;
      align-content: start;
    }
    .evidence-hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 6px;
      padding: 10px;
      border: 1px solid var(--line);
      background: #fff;
    }
    .evidence-hero strong,
    .evidence-tile strong {
      font-size: 13px;
      line-height: 1.2;
    }
    .evidence-hero span,
    .evidence-tile span {
      color: var(--muted);
      font-size: 12px;
    }
    .evidence-hero img {
      width: 100%;
      max-height: 420px;
      object-fit: contain;
      border: 1px solid var(--line);
      background: #fff;
    }
    .evidence-strip {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .evidence-tile {
      display: grid;
      grid-template-rows: auto auto minmax(180px, 1fr);
      gap: 6px;
      min-height: 240px;
      padding: 10px;
      border: 1px solid var(--line);
      background: #fff;
    }
    .evidence-tile img {
      width: 100%;
      height: 100%;
      max-height: 260px;
      object-fit: contain;
      border: 1px solid var(--line);
      background: #fff;
    }
    .layout-stage {
      position: relative;
      width: 100%;
      min-height: 220px;
      overflow: auto;
      border: 1px solid var(--line);
      background: #fff;
    }
    .layout-stage img {
      width: 100%;
      border: 0;
    }
    .layout-stage svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .layout-box { fill: rgba(28,111,184,0.08); stroke: #1c6fb8; stroke-width: 2; }
    .layout-box.weak { fill: rgba(183,121,31,0.08); stroke: #b7791f; }
    .layout-label {
      fill: #17202a;
      font-size: 18px;
      paint-order: stroke;
      stroke: #fff;
      stroke-width: 4px;
      stroke-linejoin: round;
    }
    .form-table {
      flex: 1;
      overflow: auto;
      padding: 12px;
      display: grid;
      gap: 10px;
      align-content: start;
    }
    .group { border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
    .group-title { padding: 8px 10px; background: #f7f9fb; font-weight: 700; border-bottom: 1px solid var(--line); }
    .field-row {
      display: grid;
      grid-template-columns: 1.1fr 1fr 70px;
      gap: 8px;
      align-items: center;
      padding: 8px 10px;
      border-bottom: 1px solid #eef1f4;
      cursor: pointer;
    }
    .field-row:last-child { border-bottom: 0; }
    .field-row.fail { background: #fff4f2; }
    .field-row.pass { background: #f3fbf7; }
    .field-row.selected {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
    }
    .value { color: var(--muted); overflow-wrap: anywhere; }
    .badge { justify-self: end; font-size: 12px; border-radius: 999px; padding: 2px 8px; border: 1px solid var(--line); }
    .badge.pass { color: var(--good); border-color: #b8e2d1; background: #f3fbf7; }
    .badge.fail { color: var(--bad); border-color: #efc0ba; background: #fff4f2; }
    .badge.review { color: var(--warn); border-color: #f2d39b; background: #fffaf0; }
    .source {
      justify-self: start;
      font-size: 11px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 1px 7px;
      color: var(--muted);
      background: #fff;
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
    }
    .metric { border: 1px solid var(--line); border-radius: 6px; padding: 7px 8px; background: #fff; }
    .metric strong { display: block; font-size: 16px; line-height: 1.1; }
    .metric span { color: var(--muted); font-size: 12px; }
    .side { padding: 12px; overflow: auto; gap: 12px; display: flex; flex-direction: column; }
    .status { border: 1px solid var(--line); border-radius: 8px; padding: 12px; }
    .status strong { display: block; font-size: 18px; margin-bottom: 4px; }
    .problem-list { margin: 0; padding-left: 18px; }
    .problem-list li { margin: 5px 0; color: var(--bad); cursor: pointer; }
    .problem-list li:hover { text-decoration: underline; }
    .evidence img { width: 100%; border: 1px solid var(--line); background: #fff; }
    .evidence-main {
      max-height: 360px;
      object-fit: contain;
    }
    .candidate-list {
      display: grid;
      gap: 6px;
      margin-top: 8px;
    }
    .candidate-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fbfcfd;
      font-size: 12px;
    }
    .candidate-item b {
      font-weight: 600;
      overflow-wrap: anywhere;
    }
    .candidate-item span {
      color: var(--muted);
      white-space: nowrap;
    }
    .meta { color: var(--muted); font-size: 12px; overflow-wrap: anywhere; }
    pre.meta {
      white-space: pre-wrap;
      max-height: 260px;
      overflow: auto;
      background: #f7f9fb;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
    }
    .progress-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .progress-list li {
      display: grid;
      grid-template-columns: 22px 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fafbfc;
      font-size: 13px;
      transition: background 0.2s, border-color 0.2s;
    }
    .progress-list li.pending { color: var(--muted); }
    .progress-list li.running { background: #fff7e6; border-color: #f2d39b; }
    .progress-list li.done    { background: #f3fbf7; border-color: #b8e2d1; }
    .progress-list li.failed  { background: #fff4f2; border-color: #efc0ba; }
    .progress-list li.skipped { background: #f4f6f8; border-color: var(--line); color: var(--muted); }
    .progress-list .icon { font-size: 14px; text-align: center; }
    .progress-list .label { font-weight: 600; }
    .progress-list .meta { font-size: 12px; }
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
      padding: 14px;
      background: rgba(13, 20, 28, 0.86);
    }
    .lightbox.hidden { display: none; }
    .lightbox-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: #fff;
    }
    .lightbox-bar strong {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
    }
    .lightbox button {
      background: #fff;
      border-color: #fff;
    }
    .lightbox-stage {
      min-height: 0;
      overflow: auto;
      display: grid;
      place-items: center;
    }
    .lightbox-stage img {
      max-width: none;
      max-height: none;
      width: auto;
      height: auto;
      background: #fff;
      border: 1px solid rgba(255,255,255,0.35);
    }
    @media (max-width: 1100px) {
      main { grid-template-columns: 1fr; }
      section { min-height: 380px; }
      .evidence-strip { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="toolbar">
      <h1>飞行记录单核查 Demo</h1>
      <div class="tabs">
        <button id="demoMode" class="tab active" type="button">示例</button>
        <button id="uploadMode" class="tab" type="button">上传新图</button>
      </div>
    </div>
    <form id="uploadForm" class="toolbar">
      <input id="fileInput" name="file" type="file" accept="image/*" multiple required>
      <span id="configInfo" class="meta" style="font-size: 12px; color: var(--muted);">配置加载中…</span>
      <button class="primary" type="submit">开始核查</button>
    </form>
  </header>
  <main>
    <section>
      <div class="section-head">
        <h2>影像证据</h2>
        <div id="imageToolbar" class="toolbar">
          <button id="showUpload" type="button">原图</button>
          <button id="showWarped" type="button">配准图</button>
          <button id="showOcr" type="button">OCR图</button>
          <button id="showBase" type="button">扫描底图</button>
          <button id="showAiBase" type="button">AI底图</button>
        </div>
      </div>
      <div id="taskBoard" class="task-board hidden"></div>
      <div class="viewer">
        <div id="demoViewer"><img id="mainImage" data-zoomable="true" alt="上传或配准后的表单"></div>
        <div id="liveEvidence" class="evidence-board hidden"></div>
      </div>
    </section>
    <section>
      <div class="section-head"><h2>电子化字段</h2><span id="fieldCount" class="meta">等待上传</span></div>
      <div id="summary" class="summary"></div>
      <div id="fieldTable" class="form-table"></div>
    </section>
    <section>
      <div class="section-head"><h2>核查结论</h2></div>
      <div class="side">
        <div id="status" class="status"><strong>未开始</strong><span class="meta">上传一张表单照片。</span></div>
        <ol id="progress" class="progress-list hidden">
          <li data-stage="ocr" class="pending">
            <span class="icon">⏳</span>
            <span class="label">整页 OCR / 文档矫正</span>
            <span class="meta" data-label="PP-OCRv6 原图处理">PP-OCRv6 原图处理</span>
          </li>
          <li data-stage="registration" class="pending">
            <span class="icon">⏳</span>
            <span class="label">本地配准</span>
            <span class="meta" data-label="默认关闭，仅辅助 ROI">默认关闭，仅辅助 ROI</span>
          </li>
          <li data-stage="validate" class="pending">
            <span class="icon">⏳</span>
            <span class="label">规则校验</span>
            <span class="meta" data-label="本地校验">本地校验</span>
          </li>
          <li data-stage="review" class="pending">
            <span class="icon">⏳</span>
            <span class="label">ROI 复核</span>
            <span class="meta" data-label="优先使用 PaddleOCR ROI">优先使用 PaddleOCR ROI</span>
          </li>
          <li data-stage="issue_triage" class="pending">
            <span class="icon">⏳</span>
            <span class="label">问题压缩</span>
            <span class="meta" data-label="LLM 生成精简问题列表">LLM 生成精简问题列表</span>
          </li>
        </ol>
        <ol id="problems" class="problem-list"></ol>
        <div class="evidence">
          <h3>字段证据</h3>
          <img id="roiImage" class="evidence-main" data-zoomable="true" alt="字段裁切图">
          <p id="roiMeta" class="meta"></p>
          <div id="candidateList" class="candidate-list"></div>
          <pre id="fieldRaw" class="meta"></pre>
        </div>
      </div>
    </section>
  </main>
  <div id="lightbox" class="lightbox hidden" role="dialog" aria-modal="true" aria-label="放大查看图片">
    <div class="lightbox-bar">
      <strong id="lightboxTitle">影像证据</strong>
      <button id="closeLightbox" type="button">关闭</button>
    </div>
    <div class="lightbox-stage"><img id="lightboxImage" alt="放大影像证据"></div>
  </div>
  <script>
    let lastReport = null;
    let lastManifest = null;
    let currentTasks = [];
    const sessionId = getSessionId();
    const uploadForm = document.getElementById('uploadForm');
    const fileInput = document.getElementById('fileInput');
    const mainImage = document.getElementById('mainImage');
    const demoViewer = document.getElementById('demoViewer');
    const liveEvidence = document.getElementById('liveEvidence');
    const imageToolbar = document.getElementById('imageToolbar');
    const fieldTable = document.getElementById('fieldTable');
    const problems = document.getElementById('problems');
    const statusBox = document.getElementById('status');
    const roiImage = document.getElementById('roiImage');
    const roiMeta = document.getElementById('roiMeta');
    const candidateList = document.getElementById('candidateList');
    const summaryBox = document.getElementById('summary');
    const taskBoard = document.getElementById('taskBoard');
    const lightbox = document.getElementById('lightbox');
    const lightboxImage = document.getElementById('lightboxImage');
    const lightboxTitle = document.getElementById('lightboxTitle');

    uploadForm.classList.add('hidden');
    document.addEventListener('DOMContentLoaded', loadDemo);
    document.addEventListener('DOMContentLoaded', loadConfig);
    document.getElementById('demoMode').onclick = () => {
      setMode('demo');
      loadDemo();
    };
    document.getElementById('uploadMode').onclick = () => setMode('upload');
    document.getElementById('closeLightbox').onclick = closeLightbox;
    lightbox.addEventListener('click', (event) => {
      if (event.target === lightbox) closeLightbox();
    });
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') closeLightbox();
    });
    document.addEventListener('click', (event) => {
      const target = event.target;
      if (!(target instanceof Element)) return;
      const image = target.closest('img[data-zoomable="true"]');
      if (image) openLightbox(image.getAttribute('src'), image.getAttribute('alt') || '影像证据');
    });

    function setMode(mode) {
      document.getElementById('demoMode').classList.toggle('active', mode === 'demo');
      document.getElementById('uploadMode').classList.toggle('active', mode === 'upload');
      uploadForm.classList.toggle('hidden', mode !== 'upload');
      taskBoard.classList.toggle('hidden', mode !== 'upload' || currentTasks.length === 0);
      if (mode === 'upload') {
        renderLiveIdle();
        loadTasks();
      }
    }

    async function loadDemo() {
      statusBox.innerHTML = '<strong>载入示例</strong><span class="meta">读取缓存结果，不调用云端模型。</span>';
      const response = await fetch('/api/demo');
      const payload = await response.json();
      lastManifest = payload.manifest;
      lastReport = payload.report;
      render(lastReport);
    }

    async function loadConfig() {
      // Surface the model/keys the server is using so the customer-facing UI
      // doesn't have to ask for them. The form just sends the file.
      const el = document.getElementById('configInfo');
      try {
        const cfg = await fetch('/api/config').then(r => r.json());
        const cleanerShort = String(cfg.cleaner_model || '').replace(/^deepseek-ai\//, '');
        const cleanerBudget = `${cfg.cleaner_section_concurrency || 3}路/${cfg.cleaner_section_timeout_seconds || 75}s/总${cfg.cleaner_total_budget_seconds || 90}s`;
        const missing = Object.entries(cfg.keys_configured || {})
          .filter(([, ok]) => !ok).map(([k]) => k);
        el.textContent = `OCR: PP-OCRv6 · Cleaner: ${cleanerShort} · ROI 复核: ${cfg.roi_provider}/${cfg.roi_model} · 配准: ${cfg.registration_mode} · OCR缓存: ${cfg.ppocr_cache_enabled ? 'on' : 'off'}`
          + ` · Cleaner: ${cleanerBudget} · VLM超时: ${cfg.vlm_request_timeout_seconds || 45}s`
          + (missing.length ? ` · ⚠ 缺 key: ${missing.join(', ')}` : '');
      } catch (e) {
        el.textContent = '配置加载失败';
      }
    }

    uploadForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      if (!fileInput.files.length) return;
      const formData = new FormData();
      for (const file of fileInput.files) formData.append('files', file);
      formData.append('session_id', sessionId);

      // Reset UI for a new run.
      showProgress();
      statusBox.innerHTML = '<strong>核查中</strong><span class="meta">实时进度见下方。</span>';
      fieldTable.innerHTML = '';
      problems.innerHTML = '';
      renderLivePending(fileInput.files[0]);
      roiImage.removeAttribute('src');
      roiMeta.textContent = '';
      candidateList.innerHTML = '';
      document.getElementById('fieldRaw').textContent = '';

      try {
        const response = await fetch('/api/tasks/batch', { method: 'POST', body: formData });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        currentTasks = payload.tasks || [];
        renderTasks();
        currentTasks.forEach(task => watchTask(task.task_id));
      } catch (e) {
        statusBox.innerHTML =
          `<strong>请求失败</strong><span class="meta">${escapeHtml(e.message)}</span>`;
        return;
      }
    });

    function getSessionId() {
      let value = localStorage.getItem('flight_log_session_id');
      if (!value) {
        value = `s_${Math.random().toString(16).slice(2)}_${Date.now()}`;
        localStorage.setItem('flight_log_session_id', value);
      }
      return value;
    }

    async function loadTasks() {
      try {
        const payload = await fetch(`/api/tasks?session_id=${encodeURIComponent(sessionId)}`).then(r => r.json());
        currentTasks = payload.tasks || [];
        renderTasks();
        currentTasks.filter(task => ['pending', 'running'].includes(task.status)).forEach(task => watchTask(task.task_id));
      } catch (e) {
        taskBoard.innerHTML = `<span class="meta">任务列表加载失败：${escapeHtml(e.message)}</span>`;
      }
    }

    function renderTasks() {
      taskBoard.classList.toggle('hidden', currentTasks.length === 0);
      taskBoard.innerHTML = currentTasks.map(taskCard).join('');
      taskBoard.querySelectorAll('.task-card').forEach(card => {
        card.addEventListener('click', () => selectTask(card.dataset.id));
      });
    }

    function taskCard(task) {
      const report = task.report || {};
      const summary = report.summary || {};
      const shortProblems = (report.problems || []).slice(0, 3).join('；');
      const status = task.status || 'pending';
      const stage = task.progress?.stage || status;
      const totalMs = report.timings?.total_ms;
      const meta = status === 'done'
        ? `${summary.passed_count ?? 0} 通过 · ${summary.failed_count ?? 0} 失败 · ${totalMs ? (totalMs / 1000).toFixed(1) + 's' : '完成'}`
        : status === 'failed'
          ? (task.error || '处理失败')
          : `阶段：${stage}`;
      return `
        <div class="task-card ${escapeAttr(status)}" data-id="${escapeAttr(task.task_id)}">
          <strong>${escapeHtml(task.filename || task.task_id)}</strong>
          <span class="badge ${status === 'done' ? 'pass' : status === 'failed' ? 'fail' : 'review'}">${escapeHtml(status)}</span>
          <small>${escapeHtml(meta)}</small>
          <small>${escapeHtml(shortProblems)}</small>
        </div>
      `;
    }

    function mergeTask(updated) {
      const index = currentTasks.findIndex(task => task.task_id === updated.task_id);
      if (index >= 0) currentTasks[index] = updated;
      else currentTasks.unshift(updated);
      renderTasks();
    }

    async function selectTask(taskId) {
      const payload = await fetch(`/api/tasks/${encodeURIComponent(taskId)}`).then(r => r.json());
      const task = payload.task;
      mergeTask(task);
      if (task.report) {
        lastReport = task.report;
        lastManifest = null;
        hideProgress();
        render(task.report);
      } else {
        statusBox.innerHTML = `<strong>${escapeHtml(task.status)}</strong><span class="meta">${escapeHtml(task.progress?.stage || '')}</span>`;
      }
    }

    function watchTask(taskId) {
      const events = new EventSource(`/api/tasks/${encodeURIComponent(taskId)}/events`);
      events.onmessage = (event) => {
        const payload = JSON.parse(event.data);
        if (payload.task) mergeTask(payload.task);
        const progress = payload.progress || {};
        if (progress.stage && progress.status) setStage(progress.stage, progress.status, progress);
        if (progress.stage === 'ocr' && progress.status === 'done') {
          const task = payload.task || {};
          renderLiveOcrEvidence(task.upload_url || '', progress.ocr_image_url || '', progress.ocr_blocks || []);
        }
        if (payload.status === 'done' || payload.status === 'failed' || payload.status === 'cancelled') {
          events.close();
          if (payload.status === 'done' && payload.task?.report) mergeTask(payload.task);
        }
      };
      events.onerror = () => events.close();
    }

    function showProgress() {
      const list = document.getElementById('progress');
      list.classList.remove('hidden');
      list.querySelectorAll('li').forEach(li => {
        const stage = li.dataset.stage;
        li.className = 'pending';
        li.querySelector('.icon').textContent = '⏳';
        const meta = li.querySelector('.meta');
        // Restore the default label from data-label.
        meta.textContent = meta.dataset.label || meta.textContent;
      });
    }

    function hideProgress() {
      document.getElementById('progress').classList.add('hidden');
    }

    function setStage(stage, status, extra) {
      const li = document.querySelector(`#progress li[data-stage="${stage}"]`);
      if (!li) return;
      const icon = li.querySelector('.icon');
      const meta = li.querySelector('.meta');
      const defaultLabel = meta.dataset.label || meta.textContent;
      if (status === 'running') {
        li.className = 'running';
        icon.textContent = '🔄';
        const progress = extra && extra.completed != null && extra.total != null
          ? ` · ${extra.completed}/${extra.total}`
          : '';
        meta.textContent = `${defaultLabel}${progress}`;
      } else if (status === 'done') {
        li.className = 'done';
        icon.textContent = '✅';
        const dur = extra && extra.duration_ms ? ` · ${(extra.duration_ms / 1000).toFixed(1)}s` : '';
        const extra_count = extra && extra.blocks != null ? ` · ${extra.blocks} blocks` :
                            extra && extra.count != null ? ` · ${extra.count} 字段` :
                            extra && extra.total != null ? ` · ${extra.total} 字段` : '';
        meta.textContent = `${dur.replace(/^ · /, '')}${extra_count} · ${defaultLabel}`;
      } else if (status === 'failed') {
        li.className = 'failed';
        icon.textContent = '❌';
        const reason = extra && (extra.error || extra.reason);
        meta.textContent = reason ? `错误: ${reason}` : '失败';
      } else if (status === 'skipped') {
        li.className = 'skipped';
        icon.textContent = '⏭️';
        const reason = extra && extra.reason;
        meta.textContent = reason === 'REGISTRATION_MODE=off'
          ? '已关闭，使用 PaddleOCR ROI'
          : reason === 'no_fields'
            ? '无字段需要复核'
            : '跳过';
      }
    }

    document.getElementById('showUpload').onclick = () => {
      const url = lastManifest?.images?.upload || lastReport?.upload_url;
      if (url) mainImage.src = url;
    };
    document.getElementById('showWarped').onclick = () => {
      const url = lastManifest?.images?.warped || lastReport?.warped_url;
      if (url) mainImage.src = url;
      else if (lastReport?.ocr?.ocr_image_url) mainImage.src = lastReport.ocr.ocr_image_url;
    };
    document.getElementById('showOcr').onclick = () => {
      const url = lastManifest?.images?.ocr || lastReport?.ocr?.ocr_image_url;
      if (url) mainImage.src = url;
    };
    document.getElementById('showBase').onclick = () => {
      mainImage.src = lastManifest?.images?.scan_base || '/assets/canonical/template_registration.png';
    };
    document.getElementById('showAiBase').onclick = () => {
      mainImage.src = lastManifest?.images?.gpt_base || '/assets/canonical/experimental_gpt_image_base.png';
    };

    function render(report) {
      if (!report.ok && report.error) {
        statusBox.innerHTML = `<strong>配准失败</strong><span class="meta">${escapeHtml(report.error)}</span>`;
        problems.innerHTML = '';
        fieldTable.innerHTML = '';
        if (report.upload_url) mainImage.src = report.upload_url;
        return;
      }
      mainImage.src = lastManifest?.images?.ocr || report.ocr?.ocr_image_url || report.warped_url || report.upload_url;
      renderImageEvidence(report);
      statusBox.innerHTML = report.ok
        ? '<strong style="color: var(--good)">通过</strong><span class="meta">未发现规则问题。</span>'
        : `<strong style="color: var(--bad)">不通过</strong><span class="meta">点击问题查看对应裁切证据。${report.ocr?.error ? ' OCR: ' + escapeHtml(report.ocr.error) : ''}</span>`;
      renderSummary(report);
      document.getElementById('fieldCount').textContent = `${report.fields.length} 个字段`;
      const groups = {};
      for (const field of report.fields) {
        groups[field.section] ||= [];
        groups[field.section].push(field);
      }
      fieldTable.innerHTML = Object.entries(groups).map(([section, fields]) => `
        <div class="group">
          <div class="group-title">${sectionName(section)}</div>
          ${fields.map(field => fieldRow(field)).join('')}
        </div>
      `).join('');
      fieldTable.querySelectorAll('.field-row').forEach(row => {
        row.addEventListener('click', () => selectField(row.dataset.id));
      });
      problems.innerHTML = (report.problems || []).map((p) => {
        const field = findProblemField(p, report.fields);
        return `<li data-id="${field?.id || ''}">${escapeHtml(p)}</li>`;
      }).join('');
      problems.querySelectorAll('li').forEach(item => {
        item.addEventListener('click', () => {
          const id = item.dataset.id || findProblemField(item.textContent || '', lastReport.fields)?.id || '';
          if (id) selectField(id, { jump: true });
        });
      });
      if (report.fields.length) selectField(report.fields.find(f => !f.passed)?.id || report.fields[0].id);
    }

    function renderImageEvidence(report) {
      const isDemo = Boolean(lastManifest);
      demoViewer.classList.toggle('hidden', !isDemo);
      liveEvidence.classList.toggle('hidden', isDemo);
      imageToolbar.classList.toggle('hidden', !isDemo);
      if (isDemo) return;

      const uploadUrl = report.upload_url || '';
      const ocrUrl = report.ocr?.ocr_image_url || '';
      const blocks = report.ocr?.blocks || [];
      const blockCount = blocks.length;
      const failed = report.fields?.filter(f => !f.passed).length || 0;
      liveEvidence.innerHTML = `
        <div class="evidence-hero">
          <strong>上传原图</strong>
          <span>客户提交的原始照片，作为整页 OCR 输入。</span>
          ${uploadUrl ? `<img data-zoomable="true" src="${escapeAttr(uploadUrl)}" alt="上传原图">` : '<span>暂无原图</span>'}
        </div>
        <div class="evidence-strip">
          <div class="evidence-tile">
            <strong>PP-OCRv6 矫正 / 检测图</strong>
            <span>由 PaddleOCR 输出的处理结果图，用于观察文字检测质量。</span>
            ${ocrUrl ? `<img data-zoomable="true" src="${escapeAttr(ocrUrl)}" alt="PP-OCRv6 输出图">` : '<span>暂无 OCR 图</span>'}
          </div>
          <div class="evidence-tile">
            <strong>识别 Layout</strong>
            <span>${blockCount} 个 OCR blocks；${failed} 个字段未通过或待复核。</span>
            ${layoutOverlay(ocrUrl || uploadUrl, blocks)}
          </div>
        </div>
      `;
    }

    function renderLivePending(file) {
      lastManifest = null;
      demoViewer.classList.add('hidden');
      liveEvidence.classList.remove('hidden');
      imageToolbar.classList.add('hidden');
      const preview = file ? URL.createObjectURL(file) : '';
      liveEvidence.innerHTML = `
        <div class="evidence-hero">
          <strong>上传原图</strong>
          <span>正在送入 PP-OCRv6 做文档矫正与整页 OCR。</span>
          ${preview ? `<img data-zoomable="true" src="${escapeAttr(preview)}" alt="待处理原图">` : '<span>等待图片</span>'}
        </div>
        <div class="evidence-strip">
          <div class="evidence-tile">
            <strong>PP-OCRv6 矫正 / 检测图</strong>
            <span>OCR 完成后显示。</span>
            <span>处理中…</span>
          </div>
          <div class="evidence-tile">
            <strong>识别 Layout</strong>
            <span>OCR blocks 返回后显示。</span>
            <span>等待 OCR blocks…</span>
          </div>
        </div>
      `;
    }

    function renderLiveOcrEvidence(uploadUrl, ocrUrl, blocks) {
      lastManifest = null;
      demoViewer.classList.add('hidden');
      liveEvidence.classList.remove('hidden');
      imageToolbar.classList.add('hidden');
      const blockCount = blocks.length;
      liveEvidence.innerHTML = `
        <div class="evidence-hero">
          <strong>上传原图</strong>
          <span>客户提交的原始照片，已经送入 PP-OCRv6。</span>
          ${uploadUrl ? `<img data-zoomable="true" src="${escapeAttr(uploadUrl)}" alt="上传原图">` : '<span>暂无原图</span>'}
        </div>
        <div class="evidence-strip">
          <div class="evidence-tile">
            <strong>PP-OCRv6 矫正 / 检测图</strong>
            <span>OCR 已返回，后续正在做字段归属、清洗和本地规则。</span>
            ${ocrUrl ? `<img data-zoomable="true" src="${escapeAttr(ocrUrl)}" alt="PP-OCRv6 输出图">` : '<span>OCR 未返回检测图</span>'}
          </div>
          <div class="evidence-tile">
            <strong>识别 Layout</strong>
            <span>${blockCount} 个 OCR blocks，复核完成后会补齐字段结果。</span>
            ${layoutOverlay(ocrUrl || uploadUrl, blocks)}
          </div>
        </div>
      `;
    }

    function renderLiveIdle() {
      lastManifest = null;
      lastReport = null;
      demoViewer.classList.add('hidden');
      liveEvidence.classList.remove('hidden');
      imageToolbar.classList.add('hidden');
      document.getElementById('fieldCount').textContent = '等待上传';
      summaryBox.innerHTML = '';
      fieldTable.innerHTML = '';
      problems.innerHTML = '';
      statusBox.innerHTML = '<strong>未开始</strong><span class="meta">上传一张表单照片。</span>';
      roiImage.removeAttribute('src');
      roiMeta.textContent = '';
      candidateList.innerHTML = '';
      document.getElementById('fieldRaw').textContent = '';
      liveEvidence.innerHTML = `
        <div class="evidence-hero">
          <strong>上传原图</strong>
          <span>选择文件后会显示原始照片预览，并作为 PP-OCRv6 的输入。</span>
          <span>等待选择图片。</span>
        </div>
        <div class="evidence-strip">
          <div class="evidence-tile">
            <strong>PP-OCRv6 矫正 / 检测图</strong>
            <span>上传并核查后显示 PaddleOCR 文档处理结果。</span>
            <span>等待 OCR。</span>
          </div>
          <div class="evidence-tile">
            <strong>识别 Layout</strong>
            <span>OCR blocks 返回后叠加显示文字块布局。</span>
            <span>等待 layout。</span>
          </div>
        </div>
      `;
    }

    function layoutOverlay(imageUrl, blocks) {
      if (!imageUrl) return '<span>暂无 layout 图</span>';
      const bounds = layoutBounds(blocks);
      const rects = blocks.slice(0, 260).map((block, index) => {
        const box = block.box || [];
        if (box.length < 4) return '';
        const [x1, y1, x2, y2] = box.map(Number);
        const weak = Number(block.score || 0) < 0.75 ? ' weak' : '';
        const label = index % 12 === 0 ? `<text class="layout-label" x="${x1}" y="${Math.max(18, y1 - 4)}">${escapeHtml(block.id || index)}</text>` : '';
        return `<rect class="layout-box${weak}" x="${x1}" y="${y1}" width="${Math.max(1, x2 - x1)}" height="${Math.max(1, y2 - y1)}"></rect>${label}`;
      }).join('');
      return `
        <div class="layout-stage">
          <img data-zoomable="true" src="${escapeAttr(imageUrl)}" alt="layout 底图">
          <svg viewBox="0 0 ${bounds.width} ${bounds.height}" preserveAspectRatio="none" aria-hidden="true">${rects}</svg>
        </div>
      `;
    }

    function layoutBounds(blocks) {
      if (!blocks || !blocks.length) return { width: 1600, height: 1000 };
      const maxX = Math.max(...blocks.map(b => Number(b.box?.[2] || 0)), 1);
      const maxY = Math.max(...blocks.map(b => Number(b.box?.[3] || 0)), 1);
      return { width: Math.ceil(maxX * 1.03), height: Math.ceil(maxY * 1.03) };
    }

    function renderSummary(report) {
      const s = report.summary || {};
      summaryBox.innerHTML = [
        metric(s.ocr_block_count ?? report.ocr?.blocks?.length ?? 0, 'OCR Blocks'),
        metric(s.passed_count ?? report.fields.filter(f => f.passed).length, '通过'),
        metric(s.failed_count ?? report.fields.filter(f => !f.passed).length, '失败'),
        metric(s.review_count ?? report.fields.filter(f => f.needs_review).length, '需复核'),
        metric(reviewMetricText(report), 'VLM复核'),
        metric((s.cleaner_model || report.ocr?.cleaner_model || 'cached').replace('deepseek-ai/', ''), 'Cleaner')
      ].join('');
    }

    function reviewMetricText(report) {
      const plan = report.review_plan || {};
      const summary = report.summary || {};
      const selected = plan.selected_count ?? summary.review_selected_count ?? report.timings?.review_selected_count ?? 0;
      const skipped = plan.skipped_count ?? summary.review_skipped_count ?? report.timings?.review_skipped_count ?? 0;
      const maxFields = plan.max_fields ?? summary.review_max_fields ?? '';
      return skipped ? `${selected}/${maxFields || selected}+${skipped}` : String(selected);
    }

    function metric(value, label) {
      return `<div class="metric"><strong>${escapeHtml(value)}</strong><span>${escapeHtml(label)}</span></div>`;
    }

    function fieldRow(field) {
      const cls = field.passed ? 'pass' : 'fail';
      const value = field.normalized_value || field.value || '未识别';
      const state = field.needs_review ? 'review' : cls;
      const stateText = field.needs_review ? '复核' : (field.passed ? '通过' : '失败');
      return `
        <div class="field-row ${cls}" data-id="${field.id}">
          <div>${escapeHtml(field.label)}</div>
          <div class="value">${escapeHtml(value)} <span class="source">${escapeHtml(field.source_label || sourceLabel(field.provider))}</span></div>
          <span class="badge ${state}">${stateText}</span>
        </div>
      `;
    }

    function selectField(id, options = {}) {
      const field = lastReport.fields.find(item => item.id === id);
      if (!field) return;
      fieldTable.querySelectorAll('.field-row').forEach(row => {
        row.classList.toggle('selected', row.dataset.id === id);
      });
      if (options.jump) {
        const row = fieldTable.querySelector(`.field-row[data-id="${cssEscape(id)}"]`);
        if (row) row.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
      const review = field.raw?.roi_review || null;
      const evidenceUrl = review?.roi_url || field.roi_url || lastReport.ocr?.ocr_image_url || lastReport.upload_url || '';
      roiImage.src = evidenceUrl;
      if (evidenceUrl) roiImage.dataset.zoomable = 'true';
      const candidates = lastReport.ocr?.candidates?.[field.id] || [];
      const evidenceKind = review?.roi_url ? 'qwen复核ROI' : field.roi_url ? '字段ROI' : '整页图';
      roiMeta.textContent = `${field.label} | ${evidenceKind} | ${field.source_label || sourceLabel(field.provider)} | ${field.provider}/${field.model} | ${field.message || '通过'}${field.needs_review ? ' | 需复核' : ''} | candidates=${candidates.length}`;
      candidateList.innerHTML = candidates.length
        ? candidates.slice(0, 5).map(candidate => `
            <div class="candidate-item">
              <b>${escapeHtml(candidate.text || '')}</b>
              <span>${escapeHtml(candidate.block_id || '')} · ${Number(candidate.assignment_score || 0).toFixed(2)}</span>
            </div>
          `).join('')
        : '<div class="candidate-item"><b>无候选 block</b><span>ROI/VLM</span></div>';
      document.getElementById('fieldRaw').textContent = JSON.stringify({
        value: field.value,
        normalized_value: field.normalized_value,
        confidence: field.confidence,
        needs_review: field.needs_review,
        review_reason: field.review_reason,
        evidence_url: evidenceUrl,
        raw: field.raw,
        candidates: candidates.slice(0, 5)
      }, null, 2);
    }

    function findProblemField(problem, fields) {
      const text = normalizeProblemText(problem);
      if (!text) return null;
      return fields.find(field => normalizeProblemText(field.message) === text)
        || fields.find(field => {
          const msg = normalizeProblemText(field.message);
          return msg && (text.includes(msg) || msg.includes(text));
        })
        || fields.find(field => {
          const label = normalizeFieldLabel(field.label);
          return label && (text.includes(label) || label.includes(text));
        })
        || fields.find(field => !field.passed && hasSharedProblemToken(text, field))
        || null;
    }

    function hasSharedProblemToken(text, field) {
      const haystack = normalizeProblemText(`${normalizeFieldLabel(field.label)} ${field.message}`);
      const tokens = ['授权号', '日期', '执照号', 'APU', '循环', '时间', '签名', '放行签署', '地点', '报告人', '航班号', '英文', '参考手册', '保留项目', '滑油量', '加注量', '发动机1', '发动机2'];
      return tokens.some(token => {
        const normalized = normalizeProblemText(token);
        return text.includes(normalized) && haystack.includes(normalized);
      });
    }

    function normalizeFieldLabel(value) {
      return normalizeProblemText(value).replace(/^\d+/, '');
    }

    function normalizeProblemText(value) {
      return String(value || '').replace(/\s+/g, '').replace(/[，。；:：、（）()]/g, '').toLowerCase();
    }

    function cssEscape(value) {
      if (window.CSS && CSS.escape) return CSS.escape(value);
      return String(value).replace(/["\\]/g, '\\$&');
    }

    function openLightbox(src, title) {
      if (!src) return;
      lightboxImage.src = src;
      lightboxTitle.textContent = title || '影像证据';
      lightbox.classList.remove('hidden');
    }

    function closeLightbox() {
      lightbox.classList.add('hidden');
      lightboxImage.removeAttribute('src');
    }

    function sectionName(section) {
      return ({
        header: '页首信息',
        oil: '滑油栏',
        fault_action: '故障报告 / 处理措施',
        apu: 'APU',
        airworthiness_release: '适航放行'
      })[section] || section;
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, '&#96;');
    }

    function sourceLabel(provider) {
      if (provider === 'vision-rule') return 'Checkbox';
      if (provider === 'unresolved') return 'Unresolved';
      if (String(provider).includes('fallback_cleaner')) return 'PP-OCR';
      if (provider === 'siliconflow' || provider === 'aliyun') return 'Cleaner';
      if (provider === 'mock') return 'Unresolved';
      return 'ROI-VLM';
    }
  </script>
</body>
</html>
