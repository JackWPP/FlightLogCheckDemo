canonical: {width: 2400, height: 1784}
fields:
  - id: ac_reg_digits
    label: 01 注册号
    section: header
    bbox: [480, 55, 250, 90]
    recognizer: keyed_text
    validator: digit_length
    params: {allow_lengths: [4]}
    fail_msg: 注册号不是4位数字
    assignment: {search_bbox: [410, 35, 340, 130], value_type: numeric, merge: line, roi_review: true}

  - id: oil_eng1_added
    label: 02 发动机1加注量
    section: oil
    bbox: [170, 635, 160, 58]
    recognizer: numeric_text
    validator: int_range
    params: {min: 0, max: 4}
    fail_msg: 发动机1加注量不在0-4
    assignment: {search_bbox: [170, 570, 160, 130], value_type: numeric, row: last}
  - id: oil_eng1_qty
    label: 03 发动机1滑油量
    section: oil
    bbox: [310, 635, 155, 58]
    recognizer: numeric_text
    validator: int_range
    params: {min: 15, max: 25}
    fail_msg: 发动机1滑油量不在15-25
    assignment: {search_bbox: [310, 570, 170, 130], value_type: numeric, row: last}
  - id: oil_eng2_added
    label: 04 发动机2加注量
    section: oil
    bbox: [470, 635, 130, 58]
    recognizer: numeric_text
    validator: int_range
    params: {min: 0, max: 4}
    fail_msg: 发动机2加注量不在0-4
    assignment: {search_bbox: [460, 570, 150, 130], value_type: numeric, row: last}
  - id: oil_eng2_qty
    label: 05 发动机2滑油量
    section: oil
    bbox: [580, 635, 155, 58]
    recognizer: numeric_text
    validator: int_range
    params: {min: 15, max: 25}
    fail_msg: 发动机2滑油量不在15-25
    assignment: {search_bbox: [570, 570, 180, 130], value_type: numeric, row: last}
  - id: oil_apu_added
    label: 06 APU加注量
    section: oil
    bbox: [700, 635, 135, 58]
    recognizer: numeric_text
    validator: int_range
    params: {min: 0, max: 2}
    fail_msg: APU加注量不在0-2
    assignment: {search_bbox: [680, 570, 170, 130], value_type: numeric, row: last}
  - id: oil_sign
    label: 07 滑油签名
    section: oil
    bbox: [790, 595, 190, 105]
    recognizer: signature_or_text
    validator: name_not_place
    params: {not_allow: ["重庆", "渝", "Chongqing"]}
    fail_msg: 滑油签名不是姓名
    assignment: {search_bbox: [760, 555, 230, 150], value_type: signature, prefer_roi_vlm: true, needs_review: true}

  - id: fault_flight_no
    label: 08 故障报告-航班号
    section: fault_action
    bbox: [28, 720, 170, 56]
    recognizer: keyed_text
    validator: exact_text
    params: {allow: ["N/A", "NA"]}
    fail_msg: 航班号不是N/A
    assignment: {search_bbox: [0, 660, 260, 150], value_type: closed, allow_global_value_match: false}
  - id: fault_station
    label: 09 故障报告-地点
    section: fault_action
    bbox: [198, 720, 305, 56]
    recognizer: keyed_text
    validator: exact_text
    params: {allow: ["重庆", "渝", "Chongqing"]}
    fail_msg: 故障地点不是重庆
    assignment: {search_bbox: [0, 660, 520, 140], value_type: closed, allow_global_value_match: false}
  - id: fault_reported_by
    label: 10 故障报告-报告人
    section: fault_action
    bbox: [503, 720, 265, 56]
    recognizer: signature_or_text
    validator: name_not_place
    params: {not_allow: ["重庆", "渝", "Chongqing"]}
    fail_msg: 报告人不是姓名
    assignment: {search_bbox: [420, 675, 360, 120], value_type: signature, prefer_roi_vlm: true, needs_review: true}
  - id: mechanic_checkbox
    label: 11 故障报告-机组/机务
    section: fault_action
    bbox: [765, 715, 110, 50]
    recognizer: checkbox
    validator: checked
    params: {}
    fail_msg: 机组/机务未勾选
  - id: fault_description_bilingual
    label: 12 故障报告-英文内容
    section: fault_action
    bbox: [28, 775, 875, 155]
    recognizer: free_text
    validator: contains_english
    params: {}
    fail_msg: 故障报告未填写英文
    assignment: {search_bbox: [0, 760, 880, 210], value_type: free_text, merge: line}

  - id: action_ref
    label: 13 处理措施-参考手册
    section: fault_action
    bbox: [900, 700, 515, 72]
    recognizer: keyed_text
    validator: prefix_or_exact
    params: {prefixes: ["AMM", "TSM", "FLA"], allow_exact: ["N/A", "NA"]}
    fail_msg: 参考手册不合规
    assignment: {search_bbox: [820, 680, 560, 140], value_type: ref}
  - id: action_defer_no
    label: 14 处理措施-保留单号
    section: fault_action
    bbox: [1420, 720, 210, 56]
    recognizer: keyed_text
    validator: exact_text
    params: {allow: ["N/A", "NA"]}
    fail_msg: 保留单号不是N/A
    assignment: {search_bbox: [1320, 660, 360, 160], value_type: closed, allow_global_value_match: false}
  - id: action_station
    label: 15 处理措施-地点
    section: fault_action
    bbox: [1740, 720, 190, 56]
    recognizer: keyed_text
    validator: exact_text
    params: {allow: ["重庆", "渝", "Chongqing"]}
    fail_msg: 处理地点不是重庆
    assignment: {search_bbox: [1500, 640, 460, 170], value_type: closed, allow_global_value_match: false}
  - id: action_date
    label: 16 处理措施-日期
    section: fault_action
    bbox: [1930, 720, 260, 56]
    recognizer: date_text
    validator: same_day
    params: {}
    fail_msg: 处理日期不是今天
    assignment: {search_bbox: [1880, 675, 340, 130], value_type: date, merge: date}
  - id: action_description_bilingual
    label: 17 处理措施-内容
    section: fault_action
    bbox: [900, 775, 1260, 145]
    recognizer: free_text
    validator: present
    params: {}
    fail_msg: 处理措施未填写
    assignment: {search_bbox: [880, 735, 1280, 185], value_type: free_text, merge: line}
  - id: action_removed_part_info
    label: 18 拆下件信息
    section: fault_action
    bbox: [900, 925, 560, 70]
    recognizer: keyed_text
    validator: optional
    params: {}
    fail_msg: 拆下件信息漏填
    assignment: {search_bbox: [860, 900, 640, 110], value_type: text, merge: line, prefer_roi_vlm: true, needs_review: true}
  - id: action_installed_part_info
    label: 19 安装件信息
    section: fault_action
    bbox: [1460, 925, 420, 70]
    recognizer: keyed_text
    validator: optional
    params: {}
    fail_msg: 安装件信息漏填
    assignment: {search_bbox: [1420, 900, 520, 110], value_type: text, merge: line, prefer_roi_vlm: true, needs_review: true}
  - id: action_release_sign
    label: 20 处理措施-放行签署
    section: fault_action
    bbox: [1865, 910, 175, 58]
    recognizer: signature_or_text
    validator: name_not_place
    params: {not_allow: ["重庆", "渝", "Chongqing"]}
    fail_msg: 放行签署不是姓名
    assignment: {search_bbox: [1760, 895, 260, 110], value_type: signature, prefer_roi_vlm: true, needs_review: true}
  - id: action_authorization
    label: 21 处理措施-授权号
    section: fault_action
    bbox: [2040, 910, 310, 58]
    recognizer: keyed_text
    validator: regex
    params: {pattern: "^[0-9]{6}$"}
    fail_msg: 授权号不是6位数字
    assignment: {search_bbox: [1990, 895, 360, 110], value_type: authorization, prefer_roi_vlm: true, needs_review: true}

  - id: apu_cum_hours
    label: 22 APU累计使用时间
    section: apu
    bbox: [505, 1678, 230, 100]
    recognizer: numeric_text
    validator: number_less_than
    params: {max: 9999}
    fail_msg: APU时间不小于9999
    assignment: {search_bbox: [500, 1660, 220, 124], value_type: numeric, roi_review: true}
  - id: apu_cum_cycles
    label: 23 APU累计使用循环
    section: apu
    bbox: [690, 1678, 230, 100]
    recognizer: numeric_text
    validator: number_less_than
    params: {max: 9999}
    fail_msg: APU循环不小于9999
    assignment: {search_bbox: [690, 1660, 230, 124], value_type: numeric, roi_review: true, roi_review_always: true}

  - id: awr_post_flt_checkbox
    label: 24 适航放行-航后
    section: airworthiness_release
    bbox: [925, 1588, 58, 40]
    recognizer: checkbox
    validator: checked
    params: {}
    fail_msg: 航后未勾选
  - id: awr_station
    label: 25 适航放行-地点
    section: airworthiness_release
    bbox: [1250, 1580, 180, 115]
    recognizer: keyed_text
    validator: exact_text
    params: {allow: ["重庆", "渝", "Chongqing"]}
    fail_msg: 放行地点不是重庆
    assignment: {search_bbox: [1000, 1510, 380, 220], value_type: closed, allow_global_value_match: false}
  - id: awr_date
    label: 26 适航放行-日期
    section: airworthiness_release
    bbox: [1430, 1580, 180, 115]
    recognizer: date_text
    validator: same_day
    params: {}
    fail_msg: 放行日期不是今天
    assignment: {search_bbox: [1250, 1550, 330, 180], value_type: date, merge: date}
  - id: awr_deferred_item_checked
    label: 27 适航放行-保留项目
    section: airworthiness_release
    bbox: [1615, 1615, 190, 70]
    recognizer: checkbox
    validator: checked
    params: {}
    fail_msg: 保留项目未勾选
  - id: awr_release_sign
    label: 28 适航放行-放行签署
    section: airworthiness_release
    bbox: [1805, 1580, 180, 115]
    recognizer: signature_or_text
    validator: name_not_place
    params: {not_allow: ["重庆", "渝", "Chongqing"]}
    fail_msg: 放行签署不是姓名
    assignment: {search_bbox: [1700, 1550, 270, 170], value_type: signature, prefer_roi_vlm: true, needs_review: true}
  - id: awr_license
    label: 29 适航放行-执照号
    section: airworthiness_release
    bbox: [1985, 1580, 330, 115]
    recognizer: keyed_text
    validator: regex
    params: {pattern: "^CAACML[0-9]{8}$"}
    fail_msg: 执照号不合规
    assignment: {search_bbox: [1900, 1550, 440, 170], value_type: license, prefer_roi_vlm: true, needs_review: true}
