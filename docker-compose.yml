# Flight Log Check Demo — local & production compose file.
#
# Usage:
#   cp .env.example .env   # then fill in API keys
#   docker compose build
#   docker compose up -d
#   curl -fsS http://localhost/api/demo | head
#
# HTTPS: after running certbot on the host, drop certs into deploy/certs/
# and uncomment the 443 server block in deploy/nginx.conf.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: flight-log-check-demo:latest
    container_name: flight-log-app
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Persist runtime artefacts across image rebuilds.
      - ./out:/app/out
      # outputs/ already contains demo_sample (read-only inside the image);
      # runtime/ is the live demo cache directory.
      - ./outputs/runtime:/app/outputs/runtime
    expose:
      - "8003"
    healthcheck:
      # Cheap endpoint that doesn't touch cloud APIs or demo artefacts.
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; \
              sys.exit(0 if urllib.request.urlopen('http://localhost:8003/api/health',timeout=4).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  nginx:
    image: nginx:1.27-alpine
    container_name: flight-log-nginx
    restart: unless-stopped
    # Single uncommon port. Pick something you don't already use locally.
    # Change the left side too if 9080 is taken on the host: "18080:9080".
    ports:
      - "9080:9080"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    depends_on:
      app:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
